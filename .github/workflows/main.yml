name: CI/CD Pipeline - Jeux VideoPS

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  # --- CI ---
  integration-spaceword:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "jeux-1-(Morgan)/js13k-spaceWord-de26179e0ea09cc9bcb47a3955313548b14f0257"

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "jeux-1-(Morgan)/js13k-spaceWord-de26179e0ea09cc9bcb47a3955313548b14f0257/package-lock.json"

      - name: Installation des dépendances
        run: npm install

      - name: Exécution du Linter (Google Style)
        run: npm run lint

      - name: Exécution des Tests Unitaires (Jest)
        run: npm test

      - name: Résultat des tests
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "::notice::✅ Tests Spaceword passés avec succès"
          else
            echo "::error::❌ Tests Spaceword échoués"
          fi

      - name: Audit de sécurité des dépendances
        run: npm audit --audit-level=critical

      - name: Résumé CI Spaceword
        if: always()
        run: |
          echo "## 🎮 CI Spaceword" >> $GITHUB_STEP_SUMMARY
          echo "- Tests: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Lint: Google Style Guide" >> $GITHUB_STEP_SUMMARY
          echo "- Audit: npm audit --audit-level=critical" >> $GITHUB_STEP_SUMMARY

  integration-spaceinvaders:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "jeux2-Arnold/js13k-spaceInvaders"

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "jeux2-Arnold/js13k-spaceInvaders/package-lock.json"

      - name: Installation des dépendances
        run: npm install

      - name: Exécution du Linter (Google Style)
        run: npm run lint

      - name: Exécution des Tests Unitaires (Jest)
        run: npm test

      - name: Résultat des tests
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "::notice::✅ Tests Space Invaders passés avec succès"
          else
            echo "::error::❌ Tests Space Invaders échoués"
          fi

      - name: Audit de sécurité des dépendances
        run: |
          npm audit --audit-level=critical 2>&1 | tee audit-report.txt || true
          CRITICAL=$(grep -c "Severity: critical" audit-report.txt || echo "0")
          HIGH=$(grep -c "Severity: high" audit-report.txt || echo "0")
          echo "## 🔒 Rapport d'audit Space Invaders" >> $GITHUB_STEP_SUMMARY
          echo "- Vulnérabilités critiques : $CRITICAL" >> $GITHUB_STEP_SUMMARY
          echo "- Vulnérabilités high : $HIGH" >> $GITHUB_STEP_SUMMARY

  # --- CD ---
  build-and-push-docker:
    needs: [integration-spaceword, integration-spaceinvaders]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Connexion au registre GitHub (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build et Push de l'image SpaceWord
        uses: docker/build-push-action@v5
        with:
          context: "./jeux-1-(Morgan)/js13k-spaceWord-de26179e0ea09cc9bcb47a3955313548b14f0257"
          file: "./jeux-1-(Morgan)/js13k-spaceWord-de26179e0ea09cc9bcb47a3955313548b14f0257/Dockerfile"
          push: true
          tags: ghcr.io/${{ github.repository }}/spaceword:latest

      - name: Build et Push de l'image Portail
        uses: docker/build-push-action@v5
        with:
          context: ./portail
          file: ./portail/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/portail:latests

      - name: Audit de sécurité des dépendances
        run: npm audit --audit-level=critical

  # --- GitHub Pages ---
  deploy-github-pages:
    needs: [integration-spaceword, integration-spaceinvaders]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installation et build Space Invaders
        working-directory: "jeux2-Arnold/js13k-spaceInvaders"
        run: |
          npm install                       
          npm run build

      - name: Préparation du dossier gh-pages
        run: |
          mkdir -p gh-pages/spaceinvaders
          mkdir -p gh-pages/spaceword
          cp Portail/index.html gh-pages/   
          cp Portail/styles.css gh-pages/
          cp -r jeux2-Arnold/js13k-spaceInvaders/build/. gh-pages/spaceinvaders/
          cp "jeux-1-(Morgan)/js13k-spaceWord-de26179e0ea09cc9bcb47a3955313548b14f0257/index.html" gh-pages/spaceword/                                                  
          cp "jeux-1-(Morgan)/js13k-spaceWord-de26179e0ea09cc9bcb47a3955313548b14f0257/script.js" gh-pages/spaceword/
          cp "jeux-1-(Morgan)/js13k-spaceWord-de26179e0ea09cc9bcb47a3955313548b14f0257/style.css" gh-pages/spaceword/

      - name: Upload artefact GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages/

      - name: Déploiement GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
